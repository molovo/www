language: node_js
node_js:
- node

addons:
  apt:
    packages:
    - graphicsmagick

install:
- npm install
- npm install -g roots

before_script:
- git config --global user.email "hi@molovo.co"
- git config --global user.name "James Dinsdale"

script:
- roots compile --env production

deploy:
  provider: pages
  skip_cleanup: true
  local_dir: public
  github_token: $GH_TOKEN
  repo: molovo/molovo.github.io
  target_branch: master
  on:
    branch: master

env:
  global:
  - secure: 
