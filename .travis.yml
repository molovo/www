language: node_js
node_js:
- node

addons:
  apt:
    packages:
    - graphicsmagick

branches:
  only:
  - master

install:
- npm install
- npm install -g roots

before_script:
- git config --global user.email "hi@molovo.co"
- git config --global user.name "James Dinsdale"

script:
- roots compile --env production

after_success:
- rm -rf .git
- cd public
- git init
- git remote add origin https://molovo:${GH_TOKEN}@github.com/molovo/molovo.github.io.git
- git add .
- git commit -m 'Deploy compiled site'
- git push --force origin master >/dev/null 2>&1

env:
  global:
  - secure: 
