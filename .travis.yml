language: node_js
node_js:
- node

addons:
  apt:
    packages:
    - graphicsmagick

cache:
- bundler
- yarn

before_install:
- rvm install ruby-2.3.1
- rvm use 2.3.1
- bundle install

before_script:
- export PATH="$(yarn bin):$PATH"

script:
- coffeelint assets/js/
- sass-lint --verbose --no-exit
- roots compile --env production
- bundle exec htmlproofer ./public --check-favicon --check-html --check-external-hash --check-html --check-img-http --check-opengraph

deploy:
  provider: pages
  skip_cleanup: true
  local_dir: public
  github_token: $GH_TOKEN
  repo: molovo/molovo.github.io
  target_branch: master
  on:
    branch: master

notifications:
  email: false

env:
  global:
  - secure: 
